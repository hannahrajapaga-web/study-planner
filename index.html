<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Study Planner</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    background:white;
    padding:25px;
    border-radius:10px;
    width:300px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input,button {
    width:100%;
    padding:10px;
    margin:8px 0;
}
button {
    background:#4f46e5;
    color:white;
    border:none;
}
.link {
    text-align:center;
    color:blue;
    cursor:pointer;
}
</style>
</head>

<body>
    
<div class="box" id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div id="loginMessage"></div>
<span class="link" onclick="showSignup()">Create account</span>
</div>

<div class="box" id="signupBox" style="display:none;">
<h2>Sign Up</h2>
<input id="name" placeholder="Name">
<input id="signupEmail" placeholder="Email">
<input id="signupPassword" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<div id="signupMessage"></div>
<span class="link" onclick="showLogin()">Back to login</span>
</div>

<script>
const URL = "http://localhost:9090/users";

// SWITCH
function showSignup(){
    loginBox.style.display="none";
    signupBox.style.display="block";
}
function showLogin(){
    signupBox.style.display="none";
    loginBox.style.display="block";
}

// LOGIN
async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try{
        const res = await fetch(URL + "/login",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({email,password})
        });

        const data = await res.json();

        if(data.status === "success"){
            localStorage.setItem("user", JSON.stringify(data.user));
            window.location = "dashboard.html";
        } else {
            document.getElementById("loginMessage").innerText = data.message;
        }

    } catch(err){
        document.getElementById("loginMessage").innerText = "Server not reachable!";
    }
}

// SIGNUP
async function signup(){
    const name = document.getElementById("name").value;
    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;

    try{
        const res = await fetch(URL + "/signup",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({name,email,password})
        });

        const data = await res.json();
        document.getElementById("signupMessage").innerText = data.message;

        if(data.status === "success"){
            setTimeout(showLogin,1000);
        }

    } catch(err){
        document.getElementById("signupMessage").innerText = "Server not reachable!";
    }
}
</script>

</body>
</html>
